<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CadQuery Web Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        cadquery-editor {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <cadquery-editor server-url="http://localhost:5000"></cadquery-editor>

    <!-- The component will load Three.js automatically -->
</body>
</html>
